name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  secret-scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history to scan past commits too

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Reads .gitleaks.toml from the repo root automatically.

  app-build:
    name: app/ — Build & typecheck
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Placeholder values only — never touches real Neon, Google, or
        # key vault infrastructure. Exists purely to catch build errors.
        run: npm run build
        env:
          DATABASE_URL: "postgresql://fake:fake@fake.neon.tech/fake?sslmode=require"
          AUTH_SECRET: "ci-placeholder-not-a-real-secret"
          AUTH_URL: "http://localhost:3000"
          GOOGLE_CLIENT_ID: "ci-placeholder"
          GOOGLE_CLIENT_SECRET: "ci-placeholder"
          KEYVAULT_URL: "https://placeholder.workers.dev"
          KEYVAULT_SHARED_TOKEN: "ci-placeholder"

  keyvault-typecheck:
    name: keyvault/ — Typecheck
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: keyvault
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: keyvault/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
